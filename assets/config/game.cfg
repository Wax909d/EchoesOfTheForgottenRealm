# ===========================================================================
#  Echoes of the Forgotten Realm - gameplay configuration
#  Tune these numbers and just re-run. No recompile needed.
# ===========================================================================

# ---- Player ----
player.maxHp   = 8
player.speed   = 95
player.damage  = 2

# ---- Enemy base stats: hp / speed(px per second) / contact damage ----
slime.hp        = 3
slime.speed     = 32
slime.damage    = 1

skeleton.hp     = 4
skeleton.speed  = 38
skeleton.damage = 1

archer.hp         = 3
archer.speed      = 0
archer.damage     = 1
archer.fireRate   = 2.4
archer.arrowSpeed = 120

# ---- Random enemy spawning (requirement: random spawn LOCATIONS) ----
# Map files now define geometry + player + exit + pickups only. These counts
# decide how many of each enemy are dropped onto random free floor tiles every
# time a level loads, so no two playthroughs are identical.
level1.slimes    = 4
level1.skeletons = 1
level1.archers   = 0

level2.slimes    = 3
level2.skeletons = 2
level2.archers   = 1

level3.slimes    = 2
level3.skeletons = 3
level3.archers   = 2
